spring:
  application:
    name: innorun-project

  datasource:
    url: jdbc:mysql://localhost:3306/innorun_project
    username: root
    password: '1234'
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      format_sql: true

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace
    root: info